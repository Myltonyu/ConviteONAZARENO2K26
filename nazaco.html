<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Nazareno26</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="nstyle.css">
</head>
<body>



  <!-- Container Principal -->
  <div class="container">

    <!-- Nomes dos Noivos com Type Text -->
    <h1 id="cartaconvite"></h1>

    <!-- Botão PDF -->
    <button id="btnPDF">Por favor clique aqui</button>

    <!-- Countdown -->
<div id="countdown">

  <div class="count-title">FALTAM</div>

  <div class="count-wrapper">
    <div class="count-box">
      <span id="days">00</span>
      <small>Dias</small>
    </div>

    <div class="count-box">
      <span id="hours">00</span>
      <small>Horas</small>
    </div>

    <div class="count-box">
      <span id="minutes">00</span>
      <small>Min</small>
    </div>

    <div class="count-box">
      <span id="seconds">00</span>
      <small>Seg</small>
    </div>
  </div>

</div>



  <!-- Música -->
  <audio id="musica" loop>
    <source src="linsimu/hallelujah.mp3" type="audio/mpeg">
  </audio>

  <button id="btnMusica" class="music-btn">❚❚</button>

  <!-- JavaScript -->
  <script src="nscript.js"></script>

 <footer class="credit">
  JNI <strong>DISTRITO DE MAPUTO 2K26</strong>
</footer>
   
</body>
</html>
